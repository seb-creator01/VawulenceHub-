<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VAWULENCE HUB 😈🔥 | Naija Roast Generator</title>
    <!-- html2canvas for image share -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --naija-green: #008751;
            --naija-white: #ffffff;
            --naija-yellow: #fcd116;
            --vawulence-red: #8b0000;
            --dark-bg: #0a0a0a;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Arial', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f0a 0%, #1a1a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }

        /* Floating angry emoji background */
        body::before {
            content: "😠😤🤬💀🔥😈👊💢💥🔪";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: 80px;
            opacity: 0.06;
            pointer-events: none;
            white-space: pre;
            overflow: hidden;
            z-index: 0;
            letter-spacing: 40px;
            word-break: break-all;
            line-height: 1.6;
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 30px 24px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 0 3px var(--naija-yellow), 0 0 0 6px var(--naija-green);
        }

        /* Top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .mode-btn, .mute-btn {
            background: var(--naija-green);
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .mode-btn:hover, .mute-btn:hover {
            transform: scale(1.05);
            background: #00a55c;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.3rem;
            background: linear-gradient(135deg, var(--naija-yellow), #ff6600, var(--vawulence-red));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .sub {
            text-align: center;
            color: #ddd;
            font-style: italic;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        /* Input section */
        .input-section {
            margin: 25px 0;
        }

        .name-input {
            width: 100%;
            padding: 18px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 60px;
            background: #fff;
            color: #1a1a1a;
            text-align: center;
            font-weight: bold;
            outline: none;
            margin-bottom: 18px;
        }

        .name-input:focus {
            box-shadow: 0 0 0 3px var(--naija-yellow);
        }

        .button-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .primary-btn {
            background: var(--naija-yellow);
            color: #1a3a1a;
            border: none;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .primary-btn:hover {
            transform: scale(1.03);
            background: #ffe066;
            box-shadow: 0 0 15px var(--naija-yellow);
        }

        .secondary-btn {
            background: #444;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .secondary-btn:hover {
            background: #666;
            transform: scale(1.02);
        }

        /* Roast card */
        .roast-card {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            border-radius: 40px;
            padding: 30px 20px;
            margin: 25px 0;
            text-align: center;
            border-left: 8px solid var(--vawulence-red);
            border-right: 3px solid var(--naija-yellow);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .roast-emoji {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .roast-text {
            font-size: 1.5rem;
            font-weight: bold;
            line-height: 1.4;
            margin: 20px 0;
            word-break: break-word;
            color: #fff;
        }

        .vawulence-meter {
            background: #2a2a2a;
            border-radius: 50px;
            padding: 10px 18px;
            display: inline-block;
            font-size: 1rem;
            font-weight: bold;
            margin: 10px 0;
        }

        /* Share buttons */
        .share-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 20px 0 15px;
        }

        .share-icon {
            background: #2c2c3e;
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .share-icon:hover {
            transform: translateY(-2px);
        }

        .whatsapp { background: #25D366; }
        .copy { background: #00acee; }
        .twitter { background: #1DA1F2; }
        .image-share { background: #9b59b6; }
        .link-share { background: #2c3e66; }

        .roast-again {
            background: var(--vawulence-red);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        .roast-again:hover {
            background: #aa0000;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            color: #aaa;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        @media (max-width: 550px) {
            .container { padding: 20px 16px; }
            .roast-text { font-size: 1.2rem; }
            .primary-btn, .secondary-btn { padding: 10px 18px; font-size: 1rem; }
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div class="container">
        <div class="top-bar">
            <button id="darkLightToggle" class="mode-btn">🌙 Dark/Light</button>
            <button id="muteSoundBtn" class="mute-btn">🔊 Sound ON</button>
        </div>

        <div class="header">
            <h1>😈🔥 VAWULENCE HUB 🔥😈</h1>
            <div class="sub">"We roast you like plantain — until you sweet!"</div>
        </div>

        <div class="input-section">
            <input type="text" id="userName" class="name-input" placeholder="Drop your name... e.g. Emeka, Fatima, Oga" autocomplete="off">
            <div class="button-row">

        <div id="roastCard" class="roast-card" style="display: none;">
            <div id="roastEmoji" class="roast-emoji">😈</div>
            <div id="roastMessage" class="roast-text">Your roast go appear here</div>

            <div class="share-grid">
                <button id="copyTextBtn" class="share-icon copy">📋 Copy</button>

                <button id="twitterShareBtn" class="share-icon twitter">🐦 Twitter</button>
                <button id="shareImageBtn" class="share-icon image-share">🖼️ Image</button>
                <button id="copyLinkBtn" class="share-icon link-share">🔗 Link</button>
            </div>
            
            <button id="roastAgainBtn" class="roast-again">⚡ ROAST AGAIN ⚡</button>
        </div>

        <footer>
            🔥 Developed by <strong>Seb-Creations</strong> | Pure vawulence — no real wahala 😈<br>
            📸 Images include watermark: Seb-Creations 🔥 | vawulencehub.pages.dev
        </footer>
    </div>

    <script>
        // ======================== NIGERIAN ROAST DATABASE ========================
        const prefixes = ["Oya", "Abeg", "Chai", "Bros", "Sis", "Mchew", "Guy", "Mumu", "Olodo", "Opomulero", "Ehn", "Walahi", "Talai", "Kai", "Chei", "Aunty", "Uncle", "Alhaji", "Chief", "Werey", "Ode", "Agbaya"];
        const nameReact = ["you wey call yourself", "this one wey answer", "Mr/Mrs", "almighty", "Mr man wey bear", "the great", "celebrity wey no get show", "big boy", "small pikin", "oga at the top"];
        const insults = [
            "your brain no balance", "you dey form expensive", "your swag na fake", "you too dull", "your head dey there",
            "you be like okada wey carry three passengers", "you dey waste oxygen", "your face scatter like Lagos road",
            "your IQ level na room temperature", "you be local champion for village", "your sense dey sleep", 
            "na you be why MTN dey send data alert", "you be like phone wey no get battery", "your future dark like generator fume",
            "you get mouth but no evidence", "your existence na bug", "your matter tire even God", "you be prototype of failure"
        ];
        const actions = [
            "dey beg for data", "still dey charge phone for next compound", "use your last 100 naira buy pure water",
            "dey wear fake gucci", "still dey live with mama", "never see money before", "dey shout 'we move' but no shoe",
            "dey flex on zero balance", "dey tweet like activist but no light", "dey form pastor but you owe everyone",
            "still dey use torchlight for Nokia", "dey borrow clothes for wedding", "dey watch TikTok for 2G network"
        ];
        const punchlines = [
            "e sweet you?", "who tell you say you fine?", "you no shame?", "abeg park well", "your mates dey fly",
            "even your shadow dey laugh you", "come and be going", "your ancestors dey cry", "e no better for you at all"
        ];
        const extraRoasts = [
            "Omo, you be like person wey dey use Nokia torch for midnight 😂", "Your brain dey sleep — e even snore 💀",
            "You get mouth to type name but you no get sense? 🤡", "Na you dey make 'no network' dey cry 🗑️",
            "You be like suya wey dem burn — bitter and useless 🔥", "Even baba ijebu reject your subscription 🐌",
            "Your future dey under lockdown 📉", "Dem born you as warning ⚠️", "You be like NEPA — always failing expectations 🔌",
            "You get 5G dreams for 2G brain 🧠🚫", "Oya go and sit down, even chair dey reject you 💺❌"
        ];
        const emojisList = ["😂","🤣","😭","💀","🔥","👎","🤡","🐌","💩","🗑️","📉","🪫","💢","👊","😹","🥴"];

        function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function generateRoast(name) {
            if (!name || name.trim() === "") name = "Mumu wey no input name";
            const clean = name.trim();
            
            if (Math.random() < 0.3) {
                let roast = randomFrom(extraRoasts);
                if (!roast.toLowerCase().includes(clean.toLowerCase())) roast = `${clean}, ${roast}`;
                return roast;
            }
            
            const prefix = randomFrom(prefixes);
            const insult = randomFrom(insults);
            const action = Math.random() < 0.5 ? `, ${randomFrom(actions)}` : "";
            const punch = randomFrom(punchlines);
            
            const styles = Math.floor(Math.random() * 3);
            let roast = "";
            if (styles === 0) roast = `${prefix} ${clean}! ${insult} ${action}. ${punch}`;
            else if (styles === 1) roast = `${clean}, ${insult} ${action}. ${prefix} ${punch}`;
            else roast = `${insult} ${action}. ${clean}, ${punch} 😈`;
            
            return roast.replace(/\s+/g, ' ').replace(/ ,/g, ',').trim();
        }

        function addEmojis(text) {
            let count = Math.floor(Math.random() * 3) + 2;
            let emojis = "";
            for (let i = 0; i < count; i++) emojis += randomFrom(emojisList);
            return `${text} ${emojis}`;
        }

        function getVawulence() {
            return Math.floor(Math.random() * 41) + 60;
        }

        // ======================== FIXED SOUND SYSTEM (LOUD & CLEAR) ========================
        let soundEnabled = true;
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        function playSound(type) {
            if (!soundEnabled) return;
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.connect(audioCtx.destination);
                
                if (type === 'gong') {
                    const osc = audioCtx.createOscillator();
                    osc.connect(gainNode);
                    osc.frequency.value = 160;
                    osc.type = 'sine';
                    osc.start();
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
                    osc.stop(now + 1.2);
                }
                else if (type === 'laugh') {
                    // Evil laugh effect
                    const osc1 = audioCtx.createOscillator();
                    const osc2 = audioCtx.createOscillator();
                    osc1.connect(gainNode);
                    osc2.connect(gainNode);
                    osc1.frequency.value = 300;
                    osc2.frequency.value = 450;
                    osc1.type = 'sawtooth';
                    osc2.type = 'sawtooth';
                    osc1.start();
                    osc2.start();
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
                    osc1.stop(now + 0.6);
                    osc2.stop(now + 0.6);
                }
                else if (type === 'vawulence') {
                    const osc = audioCtx.createOscillator();
                    osc.connect(gainNode);
                    osc.frequency.value = 200;
                    osc.type = 'square';
                    osc.start();
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
                    osc.stop(now + 0.5);
                    // second hit
                    setTimeout(() => {
                        if(soundEnabled && audioCtx) {
                            const osc2 = audioCtx.createOscillator();
                            const g2 = audioCtx.createGain();
                            osc2.connect(g2);
                            g2.connect(audioCtx.destination);
                            osc2.frequency.value = 160;
                            osc2.type = 'square';
                            g2.gain.setValueAtTime(0.2, audioCtx.currentTime);
                            osc2.start();
                            g2.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
                            osc2.stop(audioCtx.currentTime + 0.4);
                        }
                    }, 200);
                }
                else if (type === 'crackle') {
                    for(let i=0;i<4;i++) {
                        setTimeout(() => {
                            if(soundEnabled && audioCtx) {
                                const osc = audioCtx.createOscillator();
                                const g = audioCtx.createGain();
                                osc.connect(g);
                                g.connect(audioCtx.destination);
                                osc.frequency.value = 300 + Math.random() * 200;
                                osc.type = 'triangle';
                                g.gain.setValueAtTime(0.08, audioCtx.currentTime);
                                osc.start();
                                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.08);
                                osc.stop(audioCtx.currentTime + 0.08);
                            }
                        }, i * 60);
                    }
                }
            } catch(e) { console.log("Audio error:", e); }
        }

        // Confetti
        function burstConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];
            for(let i=0;i<100;i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 8,
                    vy: Math.random() * 5 + 3,
                    size: Math.random() * 8 + 4,
                    color: `hsl(${Math.random() * 360}, 80%, 60%)`
                });
            }
            let frames = 0;
            function animate() {
                if(frames > 70) { ctx.clearRect(0,0,canvas.width,canvas.height); return; }
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size/1.5);
                });
                frames++;
                requestAnimationFrame(animate);
            }
            animate();
        }

        let currentRoast = "";
        let currentVaw = 0;

        function displayRoast(forcedName = null) {
            let nameInput = document.getElementById('userName');
            let name = forcedName !== null ? forcedName : nameInput.value;
            if (!name || name.trim() === "") name = "Unknown Warrior";
            
            let raw = generateRoast(name);
            let final = addEmojis(raw);
            let vaw = getVawulence();
            currentRoast = final;
            currentVaw = vaw;
            
            const isEpic = vaw >= 90;
            if(isEpic) burstConfetti();
            
            document.getElementById('roastMessage').innerHTML = final;
            document.getElementById('vawulenceMeter').innerHTML = `⚡ Vawulence Level: ${vaw}% ${isEpic ? '💀🔥 EPIC VAWULENCE 🔥💀' : '😈'}`;
            document.getElementById('roastEmoji').innerHTML = isEpic ? "💀🔥😈💥" : randomFrom(emojisList);
            document.getElementById('roastCard').style.display = "block";
            
            // PLAY ALL SOUNDS (FIXED - LOUDER)
            if(soundEnabled) {
                playSound('gong');
                playSound('crackle');
                setTimeout(() => { playSound('vawulence'); }, 300);
                if(isEpic || Math.random() < 0.4) {
                    setTimeout(() => { playSound('laugh'); }, 600);
                }
            }
            
            // Easter eggs
            if(name.toLowerCase() === "seb") {
                setTimeout(() => document.getElementById('roastMessage').innerHTML = "🔥 SEB-CREATIONS THE LEGEND! Even Vawulence bows! 😈💀 " + final, 200);
            }
        }
        
        function randomRoast() {
            const fakeNames = ["Mumu", "Olodo", "Werey", "Alhaji", "Baddest", "Oga"];
            const rand = randomFrom(fakeNames);
            document.getElementById('userName').value = rand;
            displayRoast(rand);
        }

        // Share functions
        function shareWhatsApp() {
            if(!currentRoast) return;
            const text = `🔥 VAWULENCE HUB 🔥\n\n${currentRoast}\n\n⚡ Vawulence: ${currentVaw}%\n😈 Get roasted: https://vawulencehub.pages.dev/`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }
        
        function shareTwitter() {
            if(!currentRoast) return;
            const tweet = `${currentRoast} ⚡${currentVaw}% Vawulence 😈🔥\nRoast yourself:`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(tweet)} https://vawulencehub.pages.dev/`, '_blank');
        }
        
        function copyText() {
            if(!currentRoast) return;
            navigator.clipboard.writeText(`${currentRoast} | Vawulence ${currentVaw}% | VawulenceHub`);
            alert("📋 Roast copied!");
        }
        
        function copyLink() {
            navigator.clipboard.writeText("https://vawulencehub.pages.dev/");
            alert("🔗 Link copied!");
        }
        
        async function shareAsImage() {
            if(!currentRoast) return;
            const card = document.getElementById('roastCard');
            const clone = card.cloneNode(true);
            clone.style.position = 'fixed';
            clone.style.top = '-9999px';
            clone.style.left = '-9999px';
            clone.style.width = '500px';
            clone.style.background = 'linear-gradient(135deg, #1a1a2e, #0f0f1a)';
            clone.style.padding = '30px';
            clone.style.borderRadius = '40px';
            
            const watermark = document.createElement('div');
            watermark.style.marginTop = '20px';
            watermark.style.borderTop = '2px solid #fcd116';
            watermark.style.paddingTop = '12px';
            watermark.style.fontSize = '14px';
            watermark.style.textAlign = 'center';
            watermark.style.color = '#fcd116';
            watermark.innerHTML = '🖼️ Seb-Creations 🔥 | vawulencehub.pages.dev';
            clone.appendChild(watermark);
            document.body.appendChild(clone);
            
            try {
                const canvas = await html2canvas(clone, { scale: 2, backgroundColor: '#0a0a1a' });
                const link = document.createElement('a');
                link.download = 'vawulence_roast.png';
                link.href = canvas.toDataURL();
                link.click();
                alert("✅ Image saved! Watermark included.");
            } catch(e) { alert("Error generating image"); }
            finally { document.body.removeChild(clone); }
        }

        // Dark/Light mode
        let isDark = true;
        function toggleTheme() {
            isDark = !isDark;
            document.body.style.background = isDark ? "linear-gradient(135deg, #0a0f0a 0%, #1a1a1a 100%)" : "linear-gradient(135deg, #f5e6ca 0%, #fff4e0 100%)";
            document.querySelector('.container').style.background = isDark ? "rgba(0,0,0,0.9)" : "rgba(255,255,240,0.95)";
            document.querySelector('.container').style.color = isDark ? "white" : "#1a1a1a";
            document.getElementById('darkLightToggle').innerHTML = isDark ? "🌙 Dark" : "☀️ Light";
        }

        // Event listeners
        document.getElementById('roastBtn').addEventListener('click', () => displayRoast());
        document.getElementById('randomRoastBtn').addEventListener('click', randomRoast);
        document.getElementById('roastAgainBtn').addEventListener('click', () => {
            const name = document.getElementById('userName').value;
            if(name.trim()) displayRoast(name);
            else randomRoast();
        });
        document.getElementById('copyTextBtn').addEventListener('click', copyText);
        document.getElementById('whatsappShareBtn').addEventListener('click', shareWhatsApp);
        document.getElementById('twitterShareBtn').addEventListener('click', shareTwitter);
        document.getElementById('shareImageBtn').addEventListener('click', shareAsImage);
        document.getElementById('copyLinkBtn').addEventListener('click', copyLink);
        document.getElementById('darkLightToggle').addEventListener('click', toggleTheme);
        
        const muteBtn = document.getElementById('muteSoundBtn');
        muteBtn.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            muteBtn.innerHTML = soundEnabled ? "🔊 Sound ON" : "🔇 Sound OFF";
            if(!soundEnabled && audioCtx) audioCtx.suspend();
            else if(soundEnabled && audioCtx) audioCtx.resume();
        });
        
        document.getElementById('userName').addEventListener('keypress', (e) => { if(e.key === 'Enter') displayRoast(); });
        
        // Auto-init audio on first click anywhere
        document.body.addEventListener('click', () => { if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });
        
        // Welcome tease
        setTimeout(() => {
            document.getElementById('roastCard').style.display = "block";
            document.getElementById('roastMessage').innerHTML = "🔥 Type your name and collect hot vawulence! 🔥";
            document.getElementById('vawulenceMeter').innerHTML = "⚡ Ready to burn ⚡";
            document.getElementById('roastEmoji').innerHTML = "🇳🇬😈🔥";
        }, 500);
    </script>
